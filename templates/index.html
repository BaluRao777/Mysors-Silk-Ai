<!DOCTYPE html>
<html>
<head>
    <title>Mysore Silk AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="phone">

    <div class="notch"></div>

    <div class="header">
        <div class="left">
            <img src="{{ url_for('static', filename='images/profile.png') }}" class="profile">
            <div>
                <div class="name">Mysore Silk AI</div>
                <div class="status">Online</div>
            </div>
        </div>
        <div class="right">📹 📞 ⋮</div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message">
        <button id="sendBtn">➤</button>
    </div>

    <!-- ================= FILTER OVERLAY ================= -->
    <div id="filterOverlay" class="filter-overlay hidden"></div>

    <div id="filterModal" class="filter-modal hidden">
        <div class="filter-header">
            <h3>Filters</h3>
            <span onclick="closeFilter()" style="cursor:pointer;">✕</span>
        </div>

        <div class="filter-content">

            <h4>Color</h4>
            <div class="filter-group">
                <label><input type="checkbox" value="red"> Red</label>
                <label><input type="checkbox" value="green"> Green</label>
                <label><input type="checkbox" value="blue"> Blue</label>
                <label><input type="checkbox" value="gold"> Gold</label>
                <label><input type="checkbox" value="pink"> Pink</label>
                <label><input type="checkbox" value="black"> Black</label>
            </div>

            <h4>Occasion</h4>
            <div class="filter-group">
                <label><input type="checkbox" value="wedding"> Wedding</label>
                <label><input type="checkbox" value="festive"> Festive</label>
                <label><input type="checkbox" value="casual"> Casual</label>
            </div>

            <h4>Price</h4>
            <div class="filter-group">
                <label><input type="radio" name="price" value="under7000"> Under ₹7000</label>
                <label><input type="radio" name="price" value="7000to9000"> ₹7000–₹9000</label>
                <label><input type="radio" name="price" value="above9000"> Above ₹9000</label>
            </div>

            <h4>Weight</h4>
            <div class="filter-group">
                <label><input type="radio" name="weight" value="600"> 600g+</label>
                <label><input type="radio" name="weight" value="700"> 700g+</label>
            </div>

        </div>

        <div class="filter-footer">
            <button onclick="applyModernFilters()">Apply</button>
            <button onclick="resetModernFilters()">Clear</button>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='customer.js') }}"></script>
<script src="{{ url_for('static', filename='seller.js') }}"></script>
<script src="{{ url_for('static', filename='tour.js') }}"></script>

</body>
</html>
